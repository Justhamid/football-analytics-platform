name: CI — Football Analytics Platform

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1 — Qualité du code
  # ────────────────────────────────────────────────────────────
  code-quality:
    name: Vérification qualité code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pandas numpy scikit-learn sqlalchemy python-dotenv

      - name: Vérification syntaxe Python (flake8)
        continue-on-error: true
        run: |
          flake8 src/ dags/ --max-line-length=120 --exclude=__pycache__ --count --statistics || true

      - name: Vérification imports critiques
        run: |
          python -c "import pandas; print('pandas OK:', pandas.__version__)"
          python -c "import numpy; print('numpy OK:', numpy.__version__)"
          python -c "import sklearn; print('scikit-learn OK:', sklearn.__version__)"
          python -c "import sqlalchemy; print('sqlalchemy OK:', sqlalchemy.__version__)"

  # ────────────────────────────────────────────────────────────
  # JOB 2 — Sécurité : vérification .env non versionné
  # ────────────────────────────────────────────────────────────
  security-check:
    name: Vérification sécurité
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Vérifier que .env n'est pas versionné
        run: |
          if [ -f ".env" ]; then
            echo "❌ ERREUR : le fichier .env est versionné ! Retirez-le du dépôt."
            exit 1
          else
            echo "✅ .env absent du dépôt — OK"
          fi

      - name: Vérifier absence de secrets en dur
        run: |
          if grep -r "POSTGRES_PASSWORD\s*=\s*['\"][^'\"]" src/ dags/ 2>/dev/null; then
            echo "❌ ERREUR : mot de passe PostgreSQL potentiellement en dur dans le code"
            exit 1
          else
            echo "✅ Aucun secret en dur détecté — OK"
          fi

      - name: Vérifier que .env.example existe
        run: |
          if [ -f ".env.example" ]; then
            echo "✅ .env.example présent — OK"
          else
            echo "⚠️  .env.example absent — recommandé"
          fi

      - name: Vérifier que les modèles .pkl ne sont pas versionnés
        run: |
          if find . -name "*.pkl" -not -path "./.git/*" | grep -q .; then
            echo "❌ ERREUR : fichiers .pkl détectés dans le dépôt"
            find . -name "*.pkl" -not -path "./.git/*"
            exit 1
          else
            echo "✅ Aucun fichier .pkl versionné — OK"
          fi

  # ────────────────────────────────────────────────────────────
  # JOB 3 — Tests unitaires pipeline
  # ────────────────────────────────────────────────────────────
  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn python-dotenv pytest

      - name: Test déduplication MD5 (team_mapping)
        run: |
          python -c "
          import hashlib
          def match_id(date, home, away, competition):
              key = f'{date}_{home.lower().strip()}_{away.lower().strip()}_{competition}'
              return hashlib.md5(key.encode()).hexdigest()

          # Test unicité
          id1 = match_id('2024-01-01', 'Arsenal FC', 'Chelsea', 'PL')
          id2 = match_id('2024-01-01', 'arsenal fc', 'chelsea', 'PL')
          assert id1 == id2, 'Normalisation échouée'
          id3 = match_id('2024-01-02', 'Arsenal FC', 'Chelsea', 'PL')
          assert id1 != id3, 'Dates différentes doivent produire IDs différents'
          print('✅ Test déduplication MD5 — OK')
          "

      - name: Test transformation log1p / expm1
        run: |
          python -c "
          import numpy as np
          valeurs = [500000, 5000000, 50000000, 200000000]
          for v in valeurs:
              log_v = np.log1p(v)
              reconstructed = np.expm1(log_v)
              assert abs(reconstructed - v) < 1, f'Erreur reconstruction : {v}'
          print('✅ Test log1p/expm1 — OK')
          "

      - name: Test features ML (ordre et nombre)
        run: |
          python -c "
          features = [
              'matchs_jeune', 'buts_jeune', 'passes_jeune', 'minutes_jeune',
              'goals_per_90_jeune', 'assists_per_90_jeune', 'age_premier_match',
              'nb_competitions_jeune', 'height_in_cm', 'international_caps',
              'international_goals', 'valeur_moyenne_club', 'position_enc', 'foot_enc'
          ]
          assert len(features) == 14, f'Nombre de features incorrect : {len(features)}'
          assert 'valeur_moyenne_club' in features, 'Feature club manquante'
          assert 'position_enc' in features, 'Feature position manquante'
          print(f'✅ Test features ML ({len(features)} features) — OK')
          "

      - name: Test goals_per_90 (division par zéro)
        run: |
          python -c "
          import pandas as pd
          import numpy as np

          df = pd.DataFrame({
              'goals': [10, 5, 0],
              'minutes': [900, 0, 500]
          })
          df['goals_per_90'] = df['goals'] * 90 / df['minutes'].replace(0, np.nan)
          assert df['goals_per_90'].iloc[1] != df['goals_per_90'].iloc[1], 'NaN attendu pour minutes=0'
          print('✅ Test division par zéro goals_per_90 — OK')
          "

  # ────────────────────────────────────────────────────────────
  # JOB 4 — Résumé final
  # ────────────────────────────────────────────────────────────
  summary:
    name: Résumé CI
    runs-on: ubuntu-latest
    needs: [code-quality, security-check, tests]
    if: always()

    steps:
      - name: Résumé des jobs
        run: |
          echo "======================================"
          echo "  CI Football Analytics Platform"
          echo "======================================"
          echo "  ✅ Qualité code     : vérifiée"
          echo "  ✅ Sécurité         : .env non versionné"
          echo "  ✅ Tests unitaires  : déduplication, ML, SQL"
          echo "======================================"
